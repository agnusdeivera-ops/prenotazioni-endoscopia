<div class="container">
  <div class="card">
    <h2>Prenota visita endoscopica</h2>

    <form id="form">
      <!-- Nome e Cognome -->
      <div class="grid">
        <input type="text" id="nome" placeholder="Nome paziente" required>
        <input type="text" id="cognome" placeholder="Cognome" required>
      </div>

      <!-- Data di nascita e CF -->
      <div class="grid">
        <input type="date" id="data_nascita" required>
        <input type="text" id="cf" placeholder="Codice Fiscale" required>
      </div>

      <!-- Tipo visita e Medico -->
      <div class="grid">
        <select id="visita" required>
          <option value="">Seleziona tipo visita</option>
          <option>EGDS - Esofagogastroduodenoscopia</option>
          <option>Colonscopia flessibile</option>
          <option>Colonscopia con biopsie</option>
          <option>Colonscopia con polipectomia</option>
          <option>EGDS con biopsie</option>
        </select>

        <select id="medico" required>
          <option value="">Seleziona medico</option>
          <option>Dr. Rossi</option>
          <option>Dr. Bianchi</option>
          <option>Dr. Verdi</option>
        </select>
      </div>

      <!-- Data e ora -->
      <div class="grid">
        <input type="date" id="data" required>
        <input type="time" id="orario" required>
      </div>

      <button type="submit">Invia prenotazione</button>
    </form>
  </div>
</div>

<script src="script.js"></script>
